x-common-variables: &common-variables
  NODE_ENV: ${NODE_ENV:-development}
  DB_HOST: postgres
  DB_PORT: 5432
  DB_USERNAME: ${DB_USERNAME:-txdc}
  DB_PASSWORD: ${DB_PASSWORD:-txdc_secret}
  DB_DATABASE: ${DB_DATABASE:-txdc_assistant}
  REDIS_URL: redis://redis:6379
  RPC_URL: ${RPC_URL:-http://geth-node:8545}
  RPC_CHAIN_ID: ${RPC_CHAIN_ID:-123454321}
  WALLET_ENCRYPTION_KEY: ${WALLET_ENCRYPTION_KEY:-change-in-production}
  LOG_LEVEL: ${LOG_LEVEL:-info}

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: txdc-assistant
    ports:
      - '${PORT:-3000}:3000'
      - '${METRICS_PORT:-9090}:9090'
    environment:
      <<: *common-variables
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - txdc-logs:/app/logs
    restart: unless-stopped
    networks:
      - txdc-network

  postgres:
    image: postgres:16-alpine
    container_name: txdc-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-txdc}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-txdc_secret}
      POSTGRES_DB: ${DB_DATABASE:-txdc_assistant}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-txdc}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - txdc-network

  redis:
    image: redis:7-alpine
    container_name: txdc-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - txdc-network

  # Sample Geth node for development
  geth-node:
    image: ethereum/client-go:v1.13.4
    container_name: txdc-geth
    ports:
      - '8545:8545'
      - '8546:8546'
      - '30303:30303'
    volumes:
      - geth-data:/root/.ethereum
      - ./scripts/genesis.json:/scripts/genesis.json
      - ./scripts/geth-entrypoint.sh:/scripts/geth-entrypoint.sh
      - ./scripts/geth-init.sh:/scripts/geth-init.sh
    entrypoint: /bin/sh /scripts/geth-entrypoint.sh
    restart: unless-stopped
    networks:
      - txdc-network

  # One-shot container to initialize Geth accounts on first run.
  # It runs after geth-node is healthy and may exit with code 0.
  geth-init:
    image: ethereum/client-go:v1.13.4
    container_name: txdc-geth-init
    depends_on:
      geth-node:
        condition: service_started
    volumes:
      - ./scripts/geth-init.sh:/scripts/geth-init.sh
      - ./scripts/genesis.json:/scripts/genesis.json
    entrypoint: /bin/sh /scripts/geth-init.sh
    network_mode: service:geth-node
    restart: no

volumes:
  postgres-data:
  redis-data:
  geth-data:
  txdc-logs:

networks:
  txdc-network:
    driver: bridge
